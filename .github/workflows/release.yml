name: release

# Publishes to PyPI via trusted publishing (OIDC) when a v* tag is pushed.
# No tokens or secrets anywhere: PyPI trusts this repo+workflow+environment
# directly. workflow_dispatch runs the test job only (publish is tag-gated).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install PortAudio (sounddevice runtime dependency)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2
      - run: uv run --frozen pytest -q

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write   # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Check tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi
      - run: uv build
      - run: uv publish --trusted-publishing always
